[source.altirra]
name       = "Altirra (core)"
role       = "Atari 8-bit emulator core"
upstream   = "https://github.com/ilmenit/AltirraSDL"
source     = "https://github.com/mikolajmikolajczyk/AltirraSDL/tree/madside-embed"
repo       = "https://github.com/mikolajmikolajczyk/AltirraSDL.git"
branch     = "madside-embed"
ref        = "46ed1438e85f9920cae47d7b323ee3eb4b2dc9b8"
version    = "wasm embed core"
license    = "GPL-2.0-or-later"
artifact   = "src/adapters/emu/wasm/altirra-core.wasm"
built_with = "Emscripten (SDL3 embed); our AltirraEmbed fork of ilmenit/AltirraSDL (orig. Altirra by Avery Lee)"

[source.chips]
name       = "chips (C64 system core)"
role       = "Commodore 64 emulator core — 6502 CPU + VIC-II + SID + 2× CIA"
upstream   = "https://github.com/floooh/chips"
source     = "https://github.com/floooh/chips"
ref        = "9371bfcb8478aec05ad10a1293206363373c1489"
version    = "single-header C99 (systems/c64.h)"
license    = "Zlib"
artifact   = "src/plugins/emulator-c64-chips/wasm/c64-core.wasm"
built_with = "Emscripten (wasm32); our thin C wrapper over chips/systems/c64.h. ROMs supplied at init, never bundled into the core."

# Commodore's own KERNAL/BASIC/CHARGEN ROMs are Cloanto-copyright and are NOT
# shipped. We bundle the MEGA65 Open ROMs — clean-room GPL-3 replacements — as a
# runtime data asset (mere aggregation; does not relicense the app). The chips
# core takes the ROM pointers at init, so emulator code and ROM data stay
# decoupled.
[source.open_roms]
name       = "Open ROMs (C64 KERNAL/BASIC + charset)"
role       = "Free replacement for the Cloanto-copyright C64 KERNAL/BASIC/CHARGEN — Commodore ROMs not shipped"
upstream   = "https://github.com/MEGA65/open-roms"
source     = "https://github.com/MEGA65/open-roms"
ref        = "ad178dbe4d48cd6a317737a8e0e7e662f7e33d32"
version    = "prebuilt images (upstream /bin)"
license    = "GPL-3.0-or-later"
artifact   = "src/plugins/emulator-c64-chips/roms/"
built_with = "Prebuilt images from upstream /bin (not compiled here); bundled as a runtime data asset"

[source.zx_rom]
name       = "ZX Spectrum 48K ROM"
role       = "Sinclair ZX Spectrum 48K system ROM — handed to the chips zx core at init"
upstream   = "https://github.com/floooh/chips-test"
source     = "https://github.com/floooh/chips-test/blob/master/examples/roms/zx-roms.h"
ref        = "dump_amstrad_zx48k_bin (SHA1 5ea7c2b824672e914525d1d5c419d71b84a426a2, 16384 bytes)"
version    = "Sinclair 48K (1982)"
license    = "Amstrad-redistributable (1999 grant: free redistribution for emulation)"
artifact   = "src/plugins/emulator-zx-chips/roms/48.rom"
built_with = "Extracted verbatim from floooh/chips-test's embedded dump; Amstrad granted free redistribution of the Sinclair ROMs for emulator use."

[source.zx128_rom]
name       = "ZX Spectrum 128K ROMs"
role       = "Sinclair ZX Spectrum 128K system ROMs (editor + 48K BASIC banks) — handed to the chips zx core at init for the zx128 machine"
upstream   = "https://github.com/floooh/chips-test"
source     = "https://github.com/floooh/chips-test/blob/master/examples/roms/zx-roms.h"
ref        = "dump_amstrad_zx128k_0_bin (SHA1 4f4b11ec22326280bdb96e3baf9db4b4cb1d02c5) + dump_amstrad_zx128k_1_bin (SHA1 80080644289ed93d71a1103992a154cc9802b2fa), 16384 bytes each"
version    = "Sinclair 128K (1985)"
license    = "Amstrad-redistributable (1999 grant: free redistribution for emulation)"
artifact   = "src/plugins/emulator-zx-chips/roms/128-0.rom + 128-1.rom"
built_with = "Extracted verbatim from floooh/chips-test's embedded dump (same source + grant as the 48K ROM)."

# === build-time toolchains — the justfile reads these; NOT shipped, NOT in the
#     table (they compile the artifacts above, they aren't part of the product) ===

[source.clownassembler]
name       = "clownassembler"
role       = "Motorola 68000 assembler (asm68k/SN-68k compatible) — Sega Genesis/Mega Drive toolchain"
upstream   = "https://github.com/Clownacy/clownassembler"
source     = "https://github.com/Clownacy/clownassembler"
ref        = "0842de46bfb2db44fbd9e1e3d5cc7e366fb965e5"
version    = "snapshot (git)"
license    = "AGPL-3.0-or-later"
artifact   = "packages/wasm-clownassembler/clownassembler.wasm"
built_with = "wasi-sdk clang (wasm32-wasip1), single pass — committed flex/bison output (no flex/bison) + wasi-clean (no shm/fork/system/mmap), no patches. See wiki/agents/clownassembler-wasm-build.md."

[source.genesis-plus-gx]
name       = "Genesis Plus GX"
role       = "Full Sega Mega Drive / Genesis system emulator (VDP + YM2612/PSG + Z80 + I/O) — Genesis run/display backend"
upstream   = "https://github.com/ekeeke/Genesis-Plus-GX"
source     = "https://github.com/ekeeke/Genesis-Plus-GX"
ref        = "c7ecd07f0a08db1cdd6871d788476bfac55be638"
version    = "snapshot (git)"
license    = "Non-commercial (Genesis Plus GX — Charles MacDonald / Eke-Eke; some portions MAME)"
license_note = "NON-COMMERCIAL: redistributions may not be sold or used in a commercial product. Shipped as a SEPARATE, aggregated emulator-core wasm (the app instantiates + calls it over an API boundary, not linked into the AGPL code) — same footing as the chips/altirra cores. madside's own code stays AGPL-3.0; the bundled core keeps this licence. Consequence: the assembled madside distribution is not commercially redistributable. NB this restricts only the IDE — games users BUILD with madside contain no emulator code and are unaffected. Uses Musashi internally, so the existing m68k-debug adapter works."
artifact   = "packages/wasm-genesis-gpgx/genesis-gpgx.wasm"
built_with = "wasi-sdk clang reactor (single pass — gpgx commits its m68k opcode tables, no host m68kmake) over core/*.c incl. cd_hw, excluding only cd_hw/libchdr (CHD) + sound/tremor (Vorbis). A minimal osd.h replaces libretro-common and a custom frontend harness (genesis-gpgx-system.c) replaces libretro.c (load-from-buffer / frame / bitmap→pixels / m68k_get_reg + read_byte debug / audio / input). Setjmp shim under build/support/genesis-gpgx/shim. See wiki/agents/genesis-gpgx-wasm-build.md."

