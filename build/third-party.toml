# === bundled npm runtime libraries (ship inside the app) — shown in the table.
#     version + license are read live from node_modules so they can't drift from
#     package.json; `license_note` augments where the SPDX field hides nuance. ===

[bundled.clang-format]
name         = "clang-format (wasm)"
role         = "C/C++ code formatter"
npm          = "@wasm-fmt/clang-format"
upstream     = "https://github.com/llvm/llvm-project"
license_note = "MIT wrapper; clang-format itself is Apache-2.0 WITH LLVM-exception"

[bundled.jsnes]
name     = "jsnes"
role     = "NES emulator core"
npm      = "jsnes"
upstream = "https://github.com/bfirsh/jsnes"

[bundled.browser_wasi_shim]
name     = "browser_wasi_shim"
role     = "WASI runtime hosting the wasm toolchains in the browser"
npm      = "@bjorn3/browser_wasi_shim"
upstream = "https://github.com/bjorn3/browser_wasi_shim"

[bundled.fflate]
name     = "fflate"
role     = "zip / unzip of the cc65 sysroot assets"
npm      = "fflate"
upstream = "https://github.com/101arrowz/fflate"

[bundled.idb]
name     = "idb"
role     = "IndexedDB wrapper (project storage + asset cache)"
npm      = "idb"
upstream = "https://github.com/jakearchibald/idb"
