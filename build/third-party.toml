# Third-party software registry — the single source of truth for every bundled
# upstream + build-time toolchain. The justfile reads pins from here
# (`python3 scripts/third-party.py get <dotted.key>`), and the docs licence
# table is generated from here (`just third-party-docs`). Adding a platform or
# compiler = add one entry here + its (necessarily tool-specific) build recipe.

# === bundled artifacts built from source (just build-*) — shown in the table ===
# `ref` is the pinned upstream commit the justfile checks out.

# `upstream` = the canonical project (attribution + licence). `source` = the repo
# we actually build from (our fork when we carry patches; equal to `upstream`
# when we build it unmodified). `ref` is the pinned commit on `source`.

[source.mads]
name       = "Mad-Assembler (MADS)"
role       = "Atari 8-bit 6502 macro assembler"
upstream   = "https://github.com/tebe6502/Mad-Assembler"
source     = "https://github.com/tebe6502/Mad-Assembler"
ref        = "11c15fdf65d1694ca9bb5f3f2b33bf616e586a77"
version    = "2.1.6"
license    = "Freeware (custom — see upstream)"
artifact   = "src/plugins/toolchain-mads/wasm-mads/mads.wasm"
built_with = "Free Pascal (cross wasm32-wasip1); our crt.pas shim from _notes/wasm-spike"

[source.cc65]
name       = "cc65 (cc65 / ca65 / ld65)"
role       = "C compiler + 6502 assembler & linker"
upstream   = "https://github.com/cc65/cc65"
source     = "https://github.com/cc65/cc65"
ref        = "cc3c40c54e51b2d9a22b63c85c418a2b11763377"
version    = "snapshot (git)"
license    = "Zlib"
artifact   = "src/plugins/toolchain-ca65/wasm/"
built_with = "wasi-sdk clang (wasm32-wasip1); unmodified"

[source.z88dk]
name       = "z88dk (z80asm / appmake)"
role       = "Z80 assembler+linker & tape packager — ZX Spectrum toolchain (asm-first)"
upstream   = "https://github.com/z88dk/z88dk"
source     = "https://github.com/z88dk/z88dk"
ref        = "d6ea38777b002a5888138f4c1825fe9ac1647153"
version    = "snapshot (git)"
license    = "Artistic-1.0 (z88dk) / Artistic-2.0 (z80asm)"
artifact   = "src/plugins/toolchain-z88dk/wasm/"
built_with = "wasi-sdk clang (wasm32-wasip1); patch-at-build (parse1.c action-switch split, system()/mkstemp stubs, NO_GMP ti8xk guard) — see wiki/agents/z88dk-wasm-build.md. No fork."

# Prebuilt +zx C sysroot (crt0, clibs, headers, target config) bundled as a zip
# asset for the C path (#87). Taken from the z88dk v2.4 binary release, NOT the
# git snapshot above — the release ships the compiled .lib files. Minimal closure
# for `zcc +zx -create-app` (classic clib): lib/config + lib/target/zx + lib/crt
# + lib/clibs/{zx_clib,mzx,z80_clib,z80_crt0}.lib + lib/z80rules.* + include/.
[source.z88dk-sysroot-zx]
name       = "z88dk +zx sysroot (release)"
role       = "ZX Spectrum C sysroot — crt0 + clibs + headers (C path)"
upstream   = "https://github.com/z88dk/z88dk/releases/tag/v2.4"
source     = "https://github.com/z88dk/z88dk/releases/download/v2.4/z88dk-osx-2.4.zip"
ref        = "v2.4"
version    = "2.4"
license    = "Artistic-1.0 (z88dk) / Artistic-2.0 (z80asm)"
artifact   = "src/plugins/toolchain-z88dk/zx-sysroot.zip"
built_with = "repackaged from the v2.4 release (minimal +zx classic-clib closure); see wiki/agents/z88dk-wasm-build.md."

# z88dk ext/ submodules pulled for the z80asm build (pinned).
[source.z88dk-ext-regex]
