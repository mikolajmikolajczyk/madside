# Makes docs/ a self-contained pnpm root so it doesn't fold into the app's
# workspace. esbuild + sharp need their native install scripts.
allowBuilds:
  esbuild: true
  sharp: true

# Force esbuild past the transitive 0.27.7 Astro/Vite pulls in — 0.27.x carries
# GHSA-gv7w-rqvm-qjhr (HIGH), fixed in 0.28.1. Keeps the CI trivy gate green.
overrides:
  esbuild: '>=0.28.1'
