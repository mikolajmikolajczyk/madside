name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: typecheck · test · lint · build · docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # One install for the whole workspace (one root lockfile).
      - run: pnpm install --frozen-lockfile

      # `pnpm -r build` runs each package's build: @madside/ide (`tsc -b` across
      # the project references, then `vite build`) and @madside/docs (astro) —
      # so this one step covers typecheck, the app bundle, and the docs site.
      - name: Build (app + docs)
        run: pnpm -r build

      - name: Test
        run: pnpm -r test

      - name: Lint
        run: pnpm run lint

  security:
    name: secret + vuln scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # gitleaks scans history on push; fetch it all.
          fetch-depth: 0

      # Secret scan. Free for personal/public repos (no license key needed).
      # Pinned to a commit SHA (Dependabot github-actions ecosystem bumps it).
      - name: gitleaks
        uses: gitleaks/gitleaks-action@dcedce43c6f43de0b836d1fe38946645c9c638dc # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Dependency + IaC scan: fails the job on HIGH/CRITICAL findings. Mirrors
      # the manual pre-commit trivy hook so CI catches what local runs skip.
      - name: trivy fs
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
