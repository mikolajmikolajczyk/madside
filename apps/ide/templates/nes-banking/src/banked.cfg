# UxROM (mapper 2) banked layout for ld65.
#
# Three 16 KB PRG banks. Banks 0 and 1 both load at $8000 — the *switchable*
# window UxROM maps one bank into at a time. Bank 2 sits at $C000, the fixed
# last bank that always holds reset + the trampolines + the vectors.
#
# The `bank N` attribute on a MEMORY area is what makes ld65 record `bank=N` on
# that area's segments in the debug info, so the debugger can tell two routines
# at the same $8000 apart by their bank. The bank number must match the value
# the program writes to select that PRG bank at run time.

MEMORY {
    ZP:      start=$00,   size=$100,  type=rw;
    HEADER:  start=$0,    size=$10,   type=ro, file=%O, fill=yes;
    PRG0:    start=$8000, size=$4000, type=ro, file=%O, fill=yes, bank=0;
    PRG1:    start=$8000, size=$4000, type=ro, file=%O, fill=yes, bank=1;
    PRGF:    start=$c000, size=$4000, type=ro, file=%O, fill=yes, bank=2;
}

SEGMENTS {
    HEADER:  load=HEADER, type=ro;
    CODE0:   load=PRG0,   type=ro, optional=yes;
    CODE1:   load=PRG1,   type=ro, optional=yes;
    CODEF:   load=PRGF,   type=ro;
    VECTORS: load=PRGF,   type=ro, start=$fffa;
}
